<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RemedySense - Skin Remedy Analyzer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="title" data-en="RemedySense" data-ta="நிவாரணம்உணர்வு">RemedySense</h1>
                <div class="language-toggle">
                    <button class="lang-btn active" data-lang="en">English</button>
                    <button class="lang-btn" data-lang="ta">தமிழ்</button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="camera" data-en="Camera Analysis" data-ta="கேமரா பகுப்பாய்வு">Camera Analysis</button>
                <button class="tab-btn" data-tab="upload" data-en="Upload Image" data-ta="படத்தை பதிவேற்று">Upload Image</button>
                <button class="tab-btn" data-tab="dashboard" data-en="Dashboard" data-ta="대시보드">Dashboard</button>
            </div>

            <!-- Camera Tab -->
            <div id="camera" class="tab-content active">
                <div class="camera-section">
                    <div class="camera-container">
                        <video id="camera-video" autoplay playsinline></video>
                        <canvas id="camera-canvas" style="display:none;"></canvas>
                    </div>
                    <div class="camera-controls">
                        <button id="start-camera-btn" class="btn btn-primary" data-en="Start Camera" data-ta="கேமராவைத் தொடங்கவும்">Start Camera</button>
                        <button id="capture-btn" class="btn btn-success" style="display:none;" data-en="Capture & Analyze" data-ta="பிடித்து பகுப்பாய்வு செய்">Capture & Analyze</button>
                        <button id="stop-camera-btn" class="btn btn-danger" style="display:none;" data-en="Stop Camera" data-ta="கேமராவை நிறுத்து">Stop Camera</button>
                    </div>
                    <div id="camera-permission-alert" class="alert alert-warning" style="display:none;" data-en="Please allow camera access" data-ta="கேமரா அணுகலை அனுமதிக்கவும்">Please allow camera access</div>
                </div>
            </div>

            <!-- Upload Tab -->
            <div id="upload" class="tab-content">
                <div class="upload-section">
                    <div class="upload-area">
                        <input type="file" id="image-input" accept="image/*" style="display:none;">
                        <button id="upload-btn" class="btn btn-primary upload-btn" data-en="Choose Image" data-ta="படத்தைத் தேர்ந்தெடுக்கவும்">Choose Image</button>
                        <p data-en="or drag and drop" data-ta="அல்லது இழுத்து விடவும்">or drag and drop</p>
                    </div>
                    <div id="preview-container" style="display:none;">
                        <img id="preview-img" src="" alt="Preview">
                        <button id="analyze-upload-btn" class="btn btn-success" data-en="Analyze Image" data-ta="படத்தை பகுப்பாய்வு செய்">Analyze Image</button>
                    </div>
                </div>
            </div>

            <!-- Dashboard Tab -->
            <div id="dashboard" class="tab-content">
                <div class="dashboard-section">
                    <h2 data-en="Skin Issues & Remedies" data-ta="தோல் சிக்கல்கள் & நிவாரணங்கள்">Skin Issues & Remedies</h2>
                    <select id="issue-select" data-en-placeholder="Select a skin issue" data-ta-placeholder="ஒரு தோல் சிக்கலைத் தேர்ந்தெடுக்கவும்">
                        <option value="">Select a skin issue</option>
                    </select>
                    <div id="remedy-display" class="remedy-display"></div>
                </div>
            </div>
        </main>

        <!-- Results Section -->
        <div id="results-section" class="results-section" style="display:none;">
            <div class="results-header">
                <h2 data-en="Analysis Results" data-ta="பகுப்பாய்வு முடிவுகள்">Analysis Results</h2>
                <button class="close-results-btn" data-en="×" data-ta="×">×</button>
            </div>
            <div id="results-content" class="results-content"></div>
        </div>

        <!-- Loading Spinner -->
        <div id="loading-spinner" class="loading-spinner" style="display:none;">
            <div class="spinner"></div>
            <p data-en="Analyzing..." data-ta="பகுப்பாய்வு செய்யப்படுகிறது...">Analyzing...</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow.js/4.11.0/tf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow.js/4.11.0/tf-core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
    <script src="translations.js"></script>
    <script src="remedies-data.js"></script>
    <script src="script.js"></script>
</body>
</html>
